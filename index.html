<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="utility.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="cards.css">
</head>

<body>
    <nav class="flex">
        <div class="logo">
            <img src="icons/logo.svg" alt="" width="30px">
        </div>
        <div class="home">
            <img src="icons/home-icon-silhouette-svgrepo-com.svg" alt="" width="25px">
        </div>
        <input type="text" class="search flex" placeholder="What do you want to play next?">

        <div class="premium">Explore Premium</div>
        <div class="install flex">
            <img src="icons/download.svg" alt="" width="15px">
            <div class="installword">Install App</div>
        </div>
        <div class="notify">
            <img src="icons/bell.svg" alt="" width="20px">
        </div>
        <div class="account">
            <img src="icons/person-circle.svg" alt="" width="35px">
        </div>
    </nav>
    <div class="container flex">

        <div class="library">
            <div class="libraryNav flex">
                <div class="item">Your Library</div>
                <div class="item">
                    <img src="icons/plus-circle.svg" alt="add">
                </div>
                <div class="item">
                    <img src="icons/arrow-right-short.svg" alt="expand">
                </div>
            </div>
        </div>


        <div class="section">
            <ul class="topselect flex">
                <li class="topselectlist">All</li>
                <li class="topselectlist">Music</li>
                <li class="topselectlist">Podcast</li>
            </ul>

            <div class="card flex">
                <div class="playlistcards flex">
                    <div class="cardimage">
                        <img src="images/liked-songs-640.jpg" alt="liked">
                    </div>
                    <div class="playlistname">Liked Songs
                    </div>
                </div>
                <div class="playlistcards flex">
                    <div class="cardimage">
                        <img src="images/en2.jpeg" alt="liked">
                    </div>
                    <div class="playlistname">Your Top Songs 2025</div>
                </div>
                <div class="playlistcards flex">
                    <div class="cardimage">
                        <img src="images/discover.jpeg" alt="liked">
                    </div>
                    <div class="playlistname">Discover Weekly</div>
                </div>
                <div class="playlistcards flex">
                    <div class="cardimage">
                        <img src="images/trending.jpeg" alt="liked">
                    </div>
                    <div class="playlistname">Trending Now</div>
                </div>
                <div class="playlistcards flex">
                    <div class="cardimage">
                        <img src="images/en.jpeg" alt="liked">
                    </div>
                    <div class="playlistname">On Repeat</div>
                </div>
                <div class="playlistcards flex">
                    <div class="cardimage">
                        <img src="images/billion.jpeg" alt="liked">
                    </div>
                    <div class="playlistname">1 Billion Streams</div>
                </div>
                <div class="playlistcards flex">
                    <div class="cardimage">
                        <img src="images/daily.jpeg" alt="liked">
                    </div>
                    <div class="playlistname">Daily Mix 4</div>
                </div>
                <div class="playlistcards flex">
                    <div class="cardimage">
                        <img src="images/hits.jpeg" alt="liked">
                    </div>
                    <div class="playlistname">Hot Hits</div>
                </div>
            </div>

            <div class="name">
                <div class="made">Made For</div>
                <div class="myname">Adarsh</div>
            </div>
            
        </div>

    </div>


    <footer>
        Media Functions
    </footer>
    <script src="script.js"></script>
</body>

</html>
